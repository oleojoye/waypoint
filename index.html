/* ============================================================
   NOTES（簡易 Markdown）
   ============================================================ */
function simpleMarkdown(md){
  let html = escapeHtml(md||'');
  html = html.replace(/^### (.*)$/gm,'<h4>$1</h4>').replace(/^## (.*)$/gm,'<h3>$1</h3>').replace(/^# (.*)$/gm,'<h2>$1</h2>');
  html = html.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/\*(.+?)\*/g,'<em>$1</em>');
  html = html.replace(/\[(.+?)\]\((https?:\/\/[^\s)]+)\)/g,'<a href="$2" target="_blank" rel="noopener" style="color:var(--blue);">$1</a>');
  html = html.replace(/^- (.*)$/gm,'<li>$1</li>').replace(/(<li>.*<\/li>)/gs, m=>`<ul style="padding-left:18px; margin:4px 0;">${m}</ul>`);
  html = html.split(/\n{2,}/).map(p=> p.match(/^<h|^<ul/) ? p : `<p style="margin:6px 0;">${p.replace(/\n/g,'<br>')}</p>`).join('');
  return html;
}
function renderNotes(root){
  if(needsTripGuard(root,'筆記')) return;
  const trip = activeTrip();
  const notes = (state.notes[trip.id]||[]).slice().sort((a,b)=> (b.updatedAt||0)-(a.updatedAt||0));
  root.innerHTML = `
    <div class="row-between"><div class="card-sub" style="font-size:13px;">共 ${notes.length} 篇筆記</div><button class="btn btn-filled btn-sm" id="add-note-btn"><i data-lucide="plus" class="icon"></i>新增筆記</button></div>
    <div class="grid grid-2" id="notes-grid">
      ${notes.map(n=>`
        <div class="card">
          <div class="row-between">
            <div style="font-weight:700; font-size:14px;">${escapeHtml(n.title||'（無標題）')}</div>
            <div style="display:flex; gap:4px;">
              <button class="icon-btn" style="width:28px;height:28px;" data-edit-note="${n.id}"><i data-lucide="pencil" class="icon" style="width:13px;height:13px"></i></button>
              <button class="icon-btn" style="width:28px;height:28px;" data-del-note="${n.id}"><i data-lucide="trash-2" class="icon" style="width:13px;height:13px;color:var(--red)"></i></button>
            </div>
          </div>
          <div style="font-size:12.5px; color:var(--text-2); margin-top:8px; line-height:1.6;">${simpleMarkdown(n.markdown)}</div>
        </div>`).join('') || `<div class="card" style="grid-column:1/-1"><div class="empty-state"><i data-lucide="notebook-pen" class="icon"></i><div class="es-sub">還沒有筆記，支援 **粗體**、*斜體*、# 標題、- 清單、[連結](網址)</div></div></div>`}
    </div>
  `;
  root.querySelector('#add-note-btn').addEventListener('click', ()=>openNoteModal());
  root.querySelectorAll('[data-edit-note]').forEach(el=> el.addEventListener('click', ()=>openNoteModal(notes.find(n=>n.id===el.dataset.editNote))));
  root.querySelectorAll('[data-del-note]').forEach(el=> el.addEventListener('click', ()=>{
    state.notes[trip.id] = state.notes[trip.id].filter(n=>n.id!==el.dataset.delNote);
    persist(true); renderNotes(root); toast('已刪除','trash-2');
  }));
}
function openNoteModal(n){
  const trip = activeTrip(); const isEdit=!!n;
  const body = `
    <div class="field"><label>標題</label><input id="note-title" value="${escapeHtml(n?.title||'')}"></div>
    <div class="field"><label>內容（支援 Markdown：**粗體**、*斜體*、# 標題、- 清單、[文字](網址)）</label><textarea id="note-md" style="min-height:160px;">${escapeHtml(n?.markdown||'')}</textarea></div>
  `;
  openModal({title:isEdit?'編輯筆記':'新增筆記', wide:true, body, foot:`<button class="btn btn-outline" data-close>取消</button><button class="btn btn-filled" id="save-note-btn">${isEdit?'儲存':'新增'}</button>`});
  document.getElementById('save-note-btn').addEventListener('click', ()=>{
    const data = {title:document.getElementById('note-title').value, markdown:document.getElementById('note-md').value, updatedAt:Date.now()};
    if(isEdit) Object.assign(n,data); else state.notes[trip.id].push({id:uid('note'), ...data});
    persist(true); closeModal(); ui.view='notes'; persistUI(); render(); toast('已儲存','check');
  });
}

/* ============================================================
   DATA MANAGEMENT
   ============================================================ */
function renderData(root){
  root.innerHTML = `
    <div class="card">
      <div class="row-between">
        <div><div class="card-title">資料儲存</div>
        <div class="card-sub" style="margin-top:4px;">${hasArtifactStorage? '目前在 Claude 中開啟，資料會自動儲存在此對話的 Artifact 儲存空間，重新開啟不會遺失。' : '目前以獨立網頁開啟，資料會自動儲存在此瀏覽器的 localStorage（僅限這台裝置、這個瀏覽器）。'}</div></div>
        <span class="tag ${hasArtifactStorage?'tag-blue':'tag-orange'}">${hasArtifactStorage?'Claude 儲存模式':'瀏覽器儲存模式'}</span>
      </div>
    </div>
    ${!hasArtifactStorage?`<div class="card" style="background:var(--orange-soft); border-color:var(--orange-line);">
      <div style="font-size:12.5px; color:var(--text);"><strong>提醒：</strong>「AI 行程匯入」功能需要在 Claude 對話中開啟才能使用（它會呼叫 Claude API）。獨立開啟此網頁時，其餘功能都能正常運作，但AI匯入會顯示解析失敗，請改用手動新增行程。</div>
    </div>`:''}
    <div class="grid grid-2">
      <div class="card">
        <div class="card-title">匯出資料</div>
        <div class="card-sub" style="margin:6px 0 14px;">將所有旅程資料匯出成 JSON 檔案備份</div>
        <button class="btn btn-filled btn-block" id="export-btn"><i data-lucide="download" class="icon"></i>匯出 JSON</button>
      </div>
      <div class="card">
        <div class="card-title">匯入資料</div>
        <div class="card-sub" style="margin:6px 0 14px;">從備份的 JSON 檔案還原資料（會覆蓋目前所有資料）</div>
        <input type="file" id="import-file" accept=".json" style="display:none;">
        <button class="btn btn-outline btn-block" id="import-btn"><i data-lucide="upload" class="icon"></i>選擇 JSON 檔案匯入</button>
      </div>
    </div>
    <div class="card" style="border-color:var(--red-line);">
      <div class="card-title" style="color:var(--red);">清除所有資料</div>
      <div class="card-sub" style="margin:6px 0 14px;">這會刪除所有旅程與相關資料，且無法復原</div>
      <button class="btn btn-danger btn-block" id="clear-btn"><i data-lucide="trash-2" class="icon"></i>清除所有資料</button>
    </div>
  `;
  root.querySelector('#export-btn').addEventListener('click', ()=>{
    const blob = new Blob([JSON.stringify(state,null,2)], {type:'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href=url; a.download=`waypoint-backup-${todayStr()}.json`; a.click();
    URL.revokeObjectURL(url); toast('已匯出','download');
  });
  root.querySelector('#import-btn').addEventListener('click', ()=> root.querySelector('#import-file').click());
  root.querySelector('#import-file').addEventListener('change', (e)=>{
    const file = e.target.files[0]; if(!file) return;
    const reader = new FileReader();
    reader.onload = (ev)=>{
      try{
        const data = JSON.parse(ev.target.result);
        if(!data.trips) throw new Error('格式錯誤');
        state = Object.assign(defaultState(), data);
        ui.activeTripId = state.trips[0]?.id || null;
        persist(true); persistUI(); render(); toast('匯入成功','check');
      }catch(err){ toast('匯入失敗，檔案格式不正確','alert-triangle'); }
    };
    reader.readAsText(file);
  });
  root.querySelector('#clear-btn').addEventListener('click', ()=>{
    if(confirm('確定要清除所有資料嗎？此動作無法復原！')){
      state = defaultState(); ui.activeTripId=null; persist(true); persistUI(); render(); toast('已清除所有資料','trash-2');
    }
  });
}

/* ============================================================
   旅程摘要匯出（PRD 十九：旅行結束匯出）
   ============================================================ */
function renderSummary(root){
  if(needsTripGuard(root,'旅程摘要匯出')) return;
  const trip = activeTrip();
  const days = tripDayList(trip);
  const stats = tripBudgetStats(trip.id);
  const exp = (state.expenses[trip.id]||[]).slice().sort((a,b)=>(a.date||'').localeCompare(b.date||''));
  const byCat = {};
  exp.forEach(e=>{ byCat[e.category] = (byCat[e.category]||0) + Number(e.amount||0); });
  const notes = state.notes[trip.id]||[];
  const spots = [];
  days.forEach(d=> dayItems(trip.id,d.date).forEach(it=>{ if(it.location) spots.push({...it, dayNum:d.dayNum}); }));

  root.innerHTML = `
    <div class="card no-print" style="background:var(--blue-soft); border-color:var(--blue-line); display:flex; align-items:center; justify-content:space-between; gap:12px;">
      <div style="font-size:12.5px; color:var(--text);">這是給整趟旅程做總結的匯出頁，設計成適合列印/存成PDF的排版。按右邊按鈕開啟瀏覽器列印，選「另存為PDF」即可。</div>
      <button class="btn btn-filled btn-sm" id="do-print-btn" style="flex-shrink:0;"><i data-lucide="printer" class="icon"></i>列印 / 存成PDF</button>
    </div>

    <div class="card" style="text-align:center; padding:32px 20px;">
      <div style="font-family:var(--font-display); font-weight:800; font-size:24px;">${escapeHtml(trip.country)} · ${escapeHtml(trip.city)}</div>
      <div style="color:var(--text-2); font-size:13px; margin-top:6px;">${fmtDate(trip.startDate,'short')} – ${fmtDate(trip.endDate,'short')} · 共${days.length}天</div>
    </div>

    <div class="grid grid-3">
      ${statTile('總花費', fmtMoney(stats.spent, trip.currency), 'wallet', 'blue')}
      ${statTile('景點數', spots.length+'', 'map-pin', 'green')}
      ${statTile('筆記數', notes.length+'', 'notebook-pen', 'orange')}
    </div>

    <div class="card">
      <div class="card-title">每日行程回顧</div>
      <div style="margin-top:12px; display:flex; flex-direction:column; gap:16px;">
        ${days.map(d=>{
          const items = dayItems(trip.id,d.date).slice().sort((a,b)=>(a.time||'').localeCompare(b.time||''));
          if(!items.length) return '';
          return `<div style="page-break-inside:avoid;">
            <div style="font-weight:700; font-size:13px; color:${colorVar(trip.color)}; margin-bottom:6px;">D${d.dayNum} · ${fmtDate(d.date)}</div>
            ${items.map(it=>`<div style="font-size:12.5px; padding:4px 0; display:flex; gap:8px; color:var(--text-2);">
              <span class="num" style="width:42px; flex-shrink:0;">${it.time||''}</span>
              <span style="flex:1;">${escapeHtml(it.name)}${it.location?' · '+escapeHtml(it.location):''}</span>
              ${it.cost?`<span class="num">${fmtMoney(it.cost)}</span>`:''}
            </div>`).join('')}
          </div>`;
        }).join('') || `<div class="es-sub">還沒有行程紀錄</div>`}
      </div>
    </div>

    <div class="card">
      <div class="card-title">花費分析</div>
      <div style="margin-top:12px; display:flex; flex-direction:column; gap:8px;">
        ${Object.entries(byCat).sort((a,b)=>b[1]-a[1]).map(([cat,amt])=>`
          <div class="row-between" style="font-size:12.5px;"><span>${cat}</span><span class="num" style="font-weight:600;">${fmtMoney(amt)}</span></div>
        `).join('') || `<div class="es-sub">還沒有花費紀錄</div>`}
        <div class="row-between" style="font-size:13px; font-weight:700; border-top:1px solid var(--border); padding-top:8px; margin-top:4px;"><span>總計</span><span class="num">${fmtMoney(stats.spent, trip.currency)}</span></div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">景點清單</div>
      <div style="margin-top:10px; columns:2; column-gap:20px;">
        ${spots.map(s=>`<div style="font-size:12px; padding:3px 0; break-inside:avoid;">D${s.dayNum} · ${escapeHtml(s.name)}</div>`).join('') || `<div class="es-sub">還沒有標記地點</div>`}
      </div>
    </div>

    ${notes.length?`<div class="card">
      <div class="card-title">旅行筆記 / 心得</div>
      <div style="margin-top:10px; display:flex; flex-direction:column; gap:12px;">
        ${notes.map(n=>`<div style="page-break-inside:avoid;"><div style="font-weight:700; font-size:12.5px;">${escapeHtml(n.title||'（無標題）')}</div><div style="font-size:12px; color:var(--text-2); margin-top:4px;">${simpleMarkdown(n.markdown)}</div></div>`).join('')}
      </div>
    </div>`:''}
  `;
  root.querySelector('#do-print-btn').addEventListener('click', ()=> window.print());
}
function setupFab(){
  document.getElementById('fab').addEventListener('click', ()=>{
    const body = `<div style="display:flex; flex-direction:column; gap:8px;">
      ${[['calendar-plus','新增行程','itinerary'],['receipt','新增花費','expenses'],['list-todo','新增待辦','todo'],['package','新增行李項目','packing'],['notebook-pen','新增筆記','notes'],['briefcase','新增旅程','trips']].map(([icon,label,view])=>`
        <div class="checklist-row" style="cursor:pointer; border:1px solid var(--border); border-radius:12px; padding:12px;" data-fabgo="${view}">
          <i data-lucide="${icon}" class="icon" style="color:var(--blue)"></i><div class="cl-text">${label}</div><i data-lucide="chevron-right" class="icon" style="color:var(--text-3);"></i>
        </div>`).join('')}
    </div>`;
    openModal({title:'快速新增', body});
    document.querySelectorAll('[data-fabgo]').forEach(el=>{
      el.addEventListener('click', ()=>{
        const v = el.dataset.fabgo; closeModal(); ui.view=v; persistUI(); render();
        setTimeout(()=>{
          if(v==='itinerary') openItineraryItemModal();
          else if(v==='expenses') openExpenseModal();
          else if(v==='todo') openTodoAddModal('自訂');
          else if(v==='packing') { const cats=Object.keys(state.packing[ui.activeTripId]||{}); if(cats.length){ const text=prompt('新增行李項目：'); if(text){ state.packing[ui.activeTripId][cats[0]].push(mkTodo(text,false)); persist(true); render(); } } }
          else if(v==='notes') openNoteModal();
          else if(v==='trips') openTripModal();
        },30);
      });
    });
  });
}

/* ============================================================
   INIT
   ============================================================ */
async function init(){
  await loadState();
  render();
  setupFab();
  ensureGlobalRates();
}
init();

</script>
</body>
</html>
