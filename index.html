<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Waypoint · 旅行規劃</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700;800&family=Inter:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
<style>
/* ============ DESIGN TOKENS ============ */
:root{
  --bg:#F7F8FA;
  --surface:#FFFFFF;
  --surface-2:#FAFAFB;
  --border:#E4E4E7;
  --border-soft:#EEEEF0;
  --text:#18181B;
  --text-2:#71717A;
  --text-3:#A1A1AA;
  --blue:#2563EB;      --blue-soft:#EFF6FF;   --blue-line:#BFDBFE;
  --green:#16A34A;      --green-soft:#F0FDF4;  --green-line:#BBF7D0;
  --orange:#EA580C;     --orange-soft:#FFF7ED; --orange-line:#FED7AA;
  --red:#DC2626;        --red-soft:#FEF2F2;    --red-line:#FECACA;
  --radius-lg:20px;
  --radius:14px;
  --radius-sm:9px;
  --shadow-sm:0 1px 2px rgba(24,24,27,0.04);
  --shadow:0 1px 3px rgba(24,24,27,0.04), 0 8px 24px -8px rgba(24,24,27,0.08);
  --shadow-lg:0 4px 16px rgba(24,24,27,0.06), 0 16px 40px -12px rgba(24,24,27,0.14);
  --font-display:'Manrope',system-ui,-apple-system,sans-serif;
  --font-body:'Inter',system-ui,-apple-system,sans-serif;
  --font-mono:'DM Mono','SF Mono',monospace;
  --sidebar-w:236px;
  --nav-h:64px;
}
[data-theme="dark"]{
  --bg:#0D0F13;
  --surface:#17191F;
  --surface-2:#1D2027;
  --border:#2A2D36;
  --border-soft:#22252C;
  --text:#F4F4F5;
  --text-2:#9B9EA8;
  --text-3:#6B6F7A;
  --blue-soft:rgba(37,99,235,0.14); --blue-line:rgba(37,99,235,0.35);
  --green-soft:rgba(22,163,74,0.14); --green-line:rgba(22,163,74,0.35);
  --orange-soft:rgba(234,88,12,0.16); --orange-line:rgba(234,88,12,0.4);
  --red-soft:rgba(220,38,38,0.16); --red-line:rgba(220,38,38,0.4);
  --shadow-sm:0 1px 2px rgba(0,0,0,0.2);
  --shadow:0 1px 3px rgba(0,0,0,0.3), 0 8px 24px -8px rgba(0,0,0,0.5);
  --shadow-lg:0 4px 16px rgba(0,0,0,0.4), 0 16px 40px -12px rgba(0,0,0,0.6);
}
*{box-sizing:border-box; margin:0; padding:0;}
html,body{height:100%;}
body{
  font-family:var(--font-body);
  background:var(--bg);
  background-image:radial-gradient(circle at 10% 0%, var(--blue-soft) 0%, transparent 42%), radial-gradient(circle at 90% 8%, var(--green-soft) 0%, transparent 38%);
  background-attachment:fixed;
  color:var(--text);
  -webkit-font-smoothing:antialiased;
  overflow:hidden;
  transition:background .2s ease, color .2s ease;
}
::selection{background:var(--blue-soft); color:var(--blue);}
button{font-family:inherit; cursor:pointer;}
input,textarea,select{font-family:inherit; color:var(--text);}
a{color:inherit;}
.icon{width:17px; height:17px; stroke-width:2px; flex-shrink:0;}
::-webkit-scrollbar{width:8px; height:8px;}
::-webkit-scrollbar-thumb{background:var(--border); border-radius:8px;}
::-webkit-scrollbar-track{background:transparent;}

/* ============ APP SHELL ============ */
#app{display:flex; height:100vh; width:100vw;}

/* Sidebar */
#sidebar{
  width:var(--sidebar-w); flex-shrink:0; height:100%;
  background:var(--surface); border-right:1px solid var(--border);
  display:flex; flex-direction:column; padding:20px 14px;
  transition:transform .25s ease;
}
.brand{display:flex; align-items:center; gap:9px; padding:6px 8px 22px 8px;}
.brand-mark{
  width:30px; height:30px; border-radius:9px; background:var(--text);
  display:flex; align-items:center; justify-content:center; flex-shrink:0;
}
[data-theme="dark"] .brand-mark{background:var(--blue);}
.brand-mark svg{width:16px; height:16px; stroke:var(--surface); stroke-width:2.4px;}
.brand-name{font-family:var(--font-display); font-weight:800; font-size:16.5px; letter-spacing:-0.02em;}

.nav-group{margin-bottom:4px;}
.nav-label{font-size:10.5px; font-weight:700; color:var(--text-3); text-transform:uppercase; letter-spacing:.07em; padding:14px 10px 6px;}
.nav-item{
  display:flex; align-items:center; gap:10px; padding:9px 10px; border-radius:var(--radius-sm);
  font-size:13.5px; font-weight:500; color:var(--text-2); cursor:pointer; position:relative;
  transition:background .12s ease, color .12s ease;
}
.nav-item:hover{background:var(--surface-2); color:var(--text);}
.nav-item.active{background:var(--blue-soft); color:var(--blue); font-weight:600;}
.nav-item .icon{color:inherit;}
.nav-item .badge{margin-left:auto; font-size:10.5px; font-weight:700; background:var(--red); color:#fff; padding:1px 6px; border-radius:20px;}

.sidebar-footer{margin-top:auto; padding-top:12px; border-top:1px solid var(--border-soft);}
.trip-switcher{
  display:flex; align-items:center; gap:8px; padding:9px 10px; border-radius:var(--radius-sm);
  background:var(--surface-2); cursor:pointer; border:1px solid var(--border-soft);
}
.trip-switcher .dot{width:8px; height:8px; border-radius:50%; flex-shrink:0;}
.trip-switcher .info{flex:1; min-width:0;}
.trip-switcher .info .t1{font-size:12px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
.trip-switcher .info .t2{font-size:10.5px; color:var(--text-3);}

/* Mobile top bar */
#mobile-bar{display:none;}

/* Main */
#main{flex:1; display:flex; flex-direction:column; min-width:0; height:100%;}
#topbar{
  height:var(--nav-h); flex-shrink:0; display:flex; align-items:center; gap:14px;
  padding:0 26px; border-bottom:1px solid var(--border); background:var(--surface);
}
#page-title{font-family:var(--font-display); font-size:19px; font-weight:800; letter-spacing:-0.01em;}
.search-wrap{position:relative; flex:1; max-width:360px; margin-left:14px;}
.search-wrap .icon{position:absolute; left:11px; top:50%; transform:translateY(-50%); color:var(--text-3);}
#global-search{
  width:100%; padding:8px 12px 8px 34px; border-radius:10px; border:1px solid var(--border);
  background:var(--surface-2); font-size:13px; outline:none; color:var(--text);
}
#global-search:focus{border-color:var(--blue); background:var(--surface);}
#search-results{
  position:absolute; top:calc(100% + 6px); left:0; right:0; background:var(--surface); border:1px solid var(--border);
  border-radius:var(--radius); box-shadow:var(--shadow-lg); max-height:360px; overflow-y:auto; z-index:80; display:none;
}
#search-results.show{display:block;}
.search-item{padding:10px 14px; border-bottom:1px solid var(--border-soft); cursor:pointer;}
.search-item:hover{background:var(--surface-2);}
.search-item .sr-title{font-size:12.5px; font-weight:600;}
.search-item .sr-meta{font-size:11px; color:var(--text-3); margin-top:1px;}
.topbar-actions{display:flex; align-items:center; gap:8px; margin-left:auto;}
.icon-btn{
  width:34px; height:34px; border-radius:10px; border:1px solid var(--border); background:var(--surface);
  display:flex; align-items:center; justify-content:center; color:var(--text-2); flex-shrink:0;
  transition:background .12s ease, color .12s ease;
}
.icon-btn:hover{background:var(--surface-2); color:var(--text);}

#view-root{flex:1; overflow-y:auto; padding:26px 26px 90px;}
.view-inner{max-width:1180px; margin:0 auto; display:flex; flex-direction:column; gap:22px;}

/* Floating Add Button */
#fab{
  position:fixed; right:28px; bottom:28px; width:52px; height:52px; border-radius:50%;
  background:var(--blue); color:#fff; display:flex; align-items:center; justify-content:center;
  box-shadow:0 6px 20px rgba(37,99,235,.35); border:none; z-index:60; transition:transform .15s ease;
}
#fab:hover{transform:scale(1.06);}
#fab .icon{width:22px; height:22px; stroke-width:2.4px;}

/* ============ REUSABLE COMPONENTS ============ */
.card{
  background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-lg);
  box-shadow:var(--shadow-sm); padding:20px;
}
.card-title{font-family:var(--font-display); font-size:14.5px; font-weight:700; letter-spacing:-0.01em;}
.card-sub{font-size:12px; color:var(--text-3); margin-top:2px;}
.row-between{display:flex; align-items:center; justify-content:space-between; gap:10px;}
.grid{display:grid; gap:16px;}
.grid-2{grid-template-columns:repeat(2,1fr);}
.grid-3{grid-template-columns:repeat(3,1fr);}
.grid-4{grid-template-columns:repeat(4,1fr);}
@media (max-width:900px){.grid-2,.grid-3,.grid-4{grid-template-columns:1fr 1fr;}}
@media (max-width:640px){.grid-2,.grid-3,.grid-4{grid-template-columns:1fr;}}

.btn{
  display:inline-flex; align-items:center; gap:7px; font-size:13px; font-weight:600; padding:9px 15px;
  border-radius:10px; border:1px solid transparent; transition:opacity .12s ease, background .12s ease;
}
.btn .icon{width:15px; height:15px;}
.btn-filled{background:var(--blue); color:#fff;}
.btn-filled:hover{opacity:.88;}
.btn-outline{background:var(--surface); border-color:var(--border); color:var(--text);}
.btn-outline:hover{background:var(--surface-2);}
.btn-ghost{background:transparent; color:var(--text-2); border-color:transparent;}
.btn-ghost:hover{background:var(--surface-2); color:var(--text);}
.btn-danger{background:var(--red-soft); color:var(--red); border-color:var(--red-line);}
.btn-sm{padding:6px 11px; font-size:12px; border-radius:8px;}
.btn-block{width:100%; justify-content:center;}

.tag{display:inline-flex; align-items:center; gap:4px; font-size:11px; font-weight:600; padding:3px 9px; border-radius:20px;}
.tag-blue{background:var(--blue-soft); color:var(--blue);}
.tag-green{background:var(--green-soft); color:var(--green);}
.tag-orange{background:var(--orange-soft); color:var(--orange);}
.tag-red{background:var(--red-soft); color:var(--red);}
.tag-gray{background:var(--surface-2); color:var(--text-2); border:1px solid var(--border);}

.field{display:flex; flex-direction:column; gap:5px;}
.field label{font-size:11.5px; font-weight:600; color:var(--text-2);}
.field input,.field select,.field textarea{
  padding:9px 11px; border:1px solid var(--border); border-radius:9px; background:var(--surface); font-size:13px; outline:none;
  width:100%;
}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--blue);}
.field textarea{resize:vertical; min-height:64px; font-family:inherit;}

.empty-state{
  display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center;
  padding:52px 20px; color:var(--text-3); gap:10px;
}
.empty-state .icon{width:34px; height:34px; color:var(--text-3);}
.empty-state .es-title{font-size:14px; font-weight:700; color:var(--text-2); font-family:var(--font-display);}
.empty-state .es-sub{font-size:12.5px; max-width:280px;}

.progress-track{height:7px; border-radius:20px; background:var(--surface-2); overflow:hidden; border:1px solid var(--border-soft);}
.progress-fill{height:100%; border-radius:20px; transition:width .3s ease;}

.checkbox{
  width:19px; height:19px; border-radius:6px; border:1.6px solid var(--border); flex-shrink:0;
  display:flex; align-items:center; justify-content:center; transition:background .12s,border-color .12s;
}
.checkbox.checked{background:var(--blue); border-color:var(--blue);}
.checkbox.checked .icon{width:12px; height:12px; stroke:#fff; stroke-width:3px;}
.checklist-row{display:flex; align-items:center; gap:11px; padding:10px 4px; border-bottom:1px solid var(--border-soft);}
.checklist-row:last-child{border-bottom:none;}
.checklist-row .cl-text{flex:1; font-size:13px;}
.checklist-row.done .cl-text{color:var(--text-3); text-decoration:line-through;}

/* Modal */
.modal-overlay{
  position:fixed; inset:0; background:rgba(15,17,21,.5); display:none; align-items:center; justify-content:center;
  z-index:100; padding:20px; backdrop-filter:blur(2px);
}
.modal-overlay.show{display:flex;}
.modal{
  background:var(--surface); border-radius:var(--radius-lg); box-shadow:var(--shadow-lg); width:100%; max-width:520px;
  max-height:88vh; display:flex; flex-direction:column; border:1px solid var(--border);
}
.modal.wide{max-width:680px;}
.modal-head{display:flex; align-items:center; justify-content:space-between; padding:18px 22px; border-bottom:1px solid var(--border);}
.modal-head h3{font-family:var(--font-display); font-size:16px; font-weight:800;}
.modal-body{padding:20px 22px; overflow-y:auto; display:flex; flex-direction:column; gap:14px;}
.modal-foot{padding:16px 22px; border-top:1px solid var(--border); display:flex; justify-content:flex-end; gap:9px;}

/* Toast */
#toast{
  position:fixed; bottom:28px; left:50%; transform:translate(-50%,20px); background:var(--text); color:var(--bg);
  padding:11px 18px; border-radius:11px; font-size:12.5px; font-weight:600; z-index:200; opacity:0; pointer-events:none;
  transition:all .25s ease; display:flex; align-items:center; gap:8px; box-shadow:var(--shadow-lg);
}
[data-theme="dark"] #toast{background:var(--surface); border:1px solid var(--border); color:var(--text);}
#toast.show{opacity:1; transform:translate(-50%,0);}

/* Number styling */
.num{font-family:var(--font-mono);}

.hamburger-btn{display:none;}
#sidebar-overlay{display:none; position:fixed; inset:0; background:rgba(0,0,0,.35); z-index:85;}
#sidebar-overlay.show{display:block;}

/* Bottom tab bar (mobile) */
#bottom-nav{
  display:none; position:fixed; left:0; right:0; bottom:0; z-index:70;
  background:var(--surface); border-top:1px solid var(--border);
  padding:6px 4px calc(6px + env(safe-area-inset-bottom));
  align-items:stretch; justify-content:space-around;
}
.bn-item{
  flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:3px;
  padding:6px 2px; border-radius:12px; color:var(--text-3); font-size:10px; font-weight:600; min-width:0;
}
.bn-item .icon{width:20px; height:20px;}
.bn-item.active{color:var(--blue);}
.bn-item span{max-width:100%; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}

/* Mobile search overlay */
#mobile-search-btn{display:none;}
#mobile-search-overlay{
  display:none; position:fixed; top:0; left:0; right:0; bottom:0; background:var(--bg); z-index:95;
  flex-direction:column;
}
#mobile-search-overlay.show{display:flex;}
.ms-head{display:flex; align-items:center; gap:10px; padding:12px 14px; border-bottom:1px solid var(--border); background:var(--surface);}
.ms-head .search-wrap{max-width:none; margin:0; flex:1;}
#mobile-search-results{flex:1; overflow-y:auto; padding:6px 10px;}

/* ============ MOBILE (<=860px): bottom nav replaces sidebar ============ */
@media (max-width:860px){
  #sidebar{display:none !important;}
  #sidebar-overlay{display:none !important;}
  #bottom-nav{display:flex;}
  #topbar{padding:0 14px; gap:8px; height:56px;}
  #page-title{font-size:16.5px;}
  .search-wrap{display:none;}
  #mobile-search-btn{display:flex;}
  #view-root{padding:14px 14px calc(84px + env(safe-area-inset-bottom));}
  .view-inner{gap:14px;}
  .grid-2,.grid-3,.grid-4{grid-template-columns:1fr 1fr; gap:10px;}
  #fab{right:16px; bottom:calc(72px + env(safe-area-inset-bottom)); width:50px; height:50px;}
  .card{padding:16px; border-radius:16px;}
  .card-title{font-size:13.5px;}
  .btn{padding:8px 13px; font-size:12.5px;}
  .modal-overlay{padding:0; align-items:flex-end;}
  .modal{max-width:100%; width:100%; max-height:92vh; border-radius:20px 20px 0 0; animation:sheetUp .22s ease;}
  .modal-body{padding:16px 18px;}
  .modal-head{padding:16px 18px;}
  .modal-foot{padding:14px 18px; flex-direction:column-reverse;}
  .modal-foot .btn{width:100%;}
}
@media (max-width:520px){
  .grid-2,.grid-3,.grid-4{grid-template-columns:1fr;}
  #page-title{font-size:15px;}
  .card{padding:14px;}
  #view-root{padding:12px 12px calc(84px + env(safe-area-inset-bottom));}
}
@keyframes sheetUp{ from{transform:translateY(24px); opacity:.6;} to{transform:translateY(0); opacity:1;} }

/* ============ Card-list components (avatar / mini progress / chips) ============ */
.avatar-badge{width:46px; height:46px; border-radius:14px; display:flex; align-items:center; justify-content:center; flex-shrink:0; box-shadow:0 3px 8px -2px rgba(0,0,0,0.18);}
.avatar-badge .icon{width:21px; height:21px; color:#fff; stroke-width:2.3px;}
.mini-progress{height:6px; border-radius:20px; background:var(--surface-2); overflow:hidden; margin-top:12px;}
.mini-progress-fill{height:100%; border-radius:20px; transition:width .3s ease;}
.count-chip{font-size:11px; font-weight:700; padding:4px 10px; border-radius:20px; white-space:nowrap;}
.folder-card{cursor:pointer; -webkit-tap-highlight-color:transparent; transition:box-shadow .15s ease;}
.folder-card:active{box-shadow:var(--shadow-sm);}
.folder-header{display:flex; align-items:center; gap:14px;}
.folder-body-title{font-weight:800; font-size:15.5px; font-family:var(--font-display);}
.folder-body-sub{font-size:11.5px; color:var(--text-3); margin-top:2px;}
.folder-expand{margin-top:16px; padding-top:16px; border-top:1px solid var(--border-soft); display:flex; flex-direction:column; gap:12px;}
.pill-tabs{display:inline-flex; gap:4px; background:var(--surface-2); padding:4px; border-radius:12px; border:1px solid var(--border-soft);}
.pill-tab{padding:7px 16px; border-radius:9px; font-size:12.5px; font-weight:700; color:var(--text-2); cursor:pointer;}
.pill-tab.active{background:var(--surface); color:var(--text); box-shadow:var(--shadow-sm);}
.dash-hero-grid{grid-template-columns:1.3fr 1fr; gap:18px;}
.hero-card{display:flex; flex-direction:column;}
.hero-title{font-family:var(--font-display); font-weight:800; font-size:26px; letter-spacing:-0.02em; line-height:1.15;}
.hero-sub{color:var(--text-2); font-size:12.5px; margin-top:5px;}
.hero-ring-zone{display:flex; flex-direction:column; align-items:center; gap:14px; margin:22px 0 6px;}
.hero-ring-wrap{
  position:relative; width:150px; height:150px; flex-shrink:0; background:none; border:none; padding:0; cursor:pointer;
  -webkit-tap-highlight-color:transparent; transition:transform .12s ease;
}
.hero-ring-wrap:active{transform:scale(0.96);}
.hero-ring-svg{width:100%; height:100%; display:block;}
.hero-ring-arc{transition:stroke-dashoffset .5s ease;}
.hero-ring-center{position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:1px;}
.hero-ring-num{font-family:var(--font-mono); font-size:38px; font-weight:700; line-height:1; letter-spacing:-0.02em;}
.hero-ring-label{font-size:11px; color:var(--text-3); font-weight:600; margin-top:3px;}
.countdown-badge{display:inline-flex; align-items:center; gap:6px; padding:7px 14px; border-radius:20px; font-size:12px; font-weight:700; max-width:100%; text-align:center;}
.hero-notes{margin-top:14px; padding-top:14px; border-top:1px solid var(--border-soft); font-size:12.5px; color:var(--text-2); line-height:1.6;}

@keyframes ringPulseUrgent{ 0%,100%{transform:scale(1);} 50%{transform:scale(1.045);} }
@keyframes ringGlow{ 0%,100%{box-shadow:0 0 0 0 rgba(220,38,38,0.28);} 50%{box-shadow:0 0 0 10px rgba(220,38,38,0);} }
.hero-ring-wrap.pulse-urgent{border-radius:50%; animation:ringPulseUrgent 1.8s ease-in-out infinite, ringGlow 1.8s ease-in-out infinite;}
@keyframes ringGlowSoon{ 0%,100%{box-shadow:0 0 0 0 rgba(234,88,12,0.2);} 50%{box-shadow:0 0 0 8px rgba(234,88,12,0);} }
.hero-ring-wrap.pulse-soon{border-radius:50%; animation:ringGlowSoon 2.4s ease-in-out infinite;}

@media (max-width:860px){
  .dash-hero-grid{grid-template-columns:1fr; gap:12px;}
  .hero-title{font-size:22px;}
  .hero-ring-wrap{width:132px; height:132px;}
  .hero-ring-num{font-size:32px;}
  .hero-ring-zone{margin:18px 0 4px;}
}
@media (max-width:520px){
  .hero-title{font-size:20px;}
  .hero-ring-wrap{width:120px; height:120px;}
  .hero-ring-num{font-size:29px;}
  .countdown-badge{font-size:11.5px; padding:6px 12px;}
  .hero-sub{font-size:12px;}
  .itin-row{flex-wrap:wrap;}
  .itin-row .itin-actions{width:100%; justify-content:flex-end; margin-top:8px;}
  .itin-row .icon-btn{width:32px !important; height:32px !important;}
  .contact-field{flex:1 1 90px !important; min-width:0 !important; width:auto !important;}
}

@media (max-width:860px){
  .field input,.field select,.field textarea,.contact-field,#global-search,#mobile-global-search{font-size:16px !important;}
}

/* ============ Home: colorful trip modules (subscription-app inspired) ============ */
.home-hero{
  text-align:center; padding:26px 20px 22px; border-radius:24px; position:relative; overflow:hidden;
  background:linear-gradient(160deg, var(--hero-tint,var(--blue-soft)) 0%, var(--surface) 65%);
  border:1px solid var(--border);
}

/* ---------------------------- 狀態 ---------------------------- */
let state = null;
let ui = { view:'dashboard', activeTripId:null, darkMode:false, searchQuery:'' };
let saveTimer = null;

function defaultState(){
  return { trips:[], itinerary:{}, expenses:{}, todos:{}, packing:{}, documents:{}, transport:{}, accommodation:{}, notes:{}, exchangeRates:{} };
}

function uid(prefix){ return (prefix||'id')+'_'+Math.random().toString(36).slice(2,9)+Date.now().toString(36).slice(-4); }

/* ---------------------------- 儲存層（雙模式） ----------------------------
   在 Claude.ai 內開啟時：使用 Claude Artifact 的持久化儲存 (window.storage)
   下載後獨立開啟（一般瀏覽器）時：自動退回使用瀏覽器 localStorage
   兩種情況都會「自動儲存」，符合離線可用的需求。
------------------------------------------------------------------------- */
const hasArtifactStorage = (typeof window!=='undefined') && window.storage && typeof window.storage.get==='function';

async function storageGet(key){
  if(hasArtifactStorage){
    try{ return await window.storage.get(key, false); }catch(e){ return null; }
  }
  try{ const v = localStorage.getItem(key); return v!=null ? {value:v} : null; }catch(e){ return null; }
}
async function storageSet(key, value){
  if(hasArtifactStorage){
    try{ await window.storage.set(key, value, false); }catch(e){ console.error('儲存失敗', e); }
    return;
  }
  try{ localStorage.setItem(key, value); }catch(e){ console.error('儲存失敗', e); }
}

async function loadState(){
  try{
    const res = await storageGet(STORAGE_KEY);
    if(res && res.value){
      state = JSON.parse(res.value);
    } else {
      state = seedState();
      await persist(true);
    }
  }catch(e){
    state = seedState();
  }
  try{
    const uires = await storageGet(STORAGE_KEY+'-ui');
    if(uires && uires.value){ ui = Object.assign(ui, JSON.parse(uires.value)); }
  }catch(e){/* first run */}
  if(!ui.activeTripId && state.trips.length){ ui.activeTripId = state.trips[0].id; }
  applyTheme();
}

function persist(immediate){
  if(saveTimer) clearTimeout(saveTimer);
  const doSave = ()=> storageSet(STORAGE_KEY, JSON.stringify(state));
  if(immediate){ doSave(); } else { saveTimer = setTimeout(doSave, 350); }
}
function persistUI(){
  storageSet(STORAGE_KEY+'-ui', JSON.stringify(ui));
}

function applyTheme(){
  document.documentElement.setAttribute('data-theme', ui.darkMode ? 'dark' : 'light');
}

/* ---------------------------- 小工具 ---------------------------- */
function fmtMoney(n, currency){
  const v = Number(n||0);
  return (currency? currency+' ':'') + v.toLocaleString('zh-TW',{maximumFractionDigits:0});
}
function fmtDate(d, opts){
  if(!d) return '—';
  const date = new Date(d+'T00:00:00');
  if(isNaN(date)) return d;
  const weekday = ['日','一','二','三','四','五','六'][date.getDay()];
  if(opts==='short') return `${date.getMonth()+1}/${date.getDate()}`;
  return `${date.getMonth()+1}/${date.getDate()}（${weekday}）`;
}
function daysBetween(a,b){
  const d1 = new Date(a+'T00:00:00'), d2 = new Date(b+'T00:00:00');
  return Math.round((d2-d1)/86400000);
}
function todayStr(){
  return new Date().toISOString().slice(0,10);
}
function tripDayList(trip){
  const days = [];
  if(!trip.startDate||!trip.endDate) return days;
  let cur = new Date(trip.startDate+'T00:00:00');
  const end = new Date(trip.endDate+'T00:00:00');
  let i=1;
  while(cur<=end){
    days.push({dayNum:i, date: cur.toISOString().slice(0,10)});
    cur.setDate(cur.getDate()+1); i++;
  }
  return days;
}
function activeTrip(){
  return state.trips.find(t=>t.id===ui.activeTripId) || null;
}
function escapeHtml(s){
  return String(s==null?'':s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function toast(msg, icon){
  const el = document.getElementById('toast');
  el.innerHTML = `${icon?`<i data-lucide="${icon}" class="icon" style="width:15px;height:15px"></i>`:''}<span>${escapeHtml(msg)}</span>`;
  el.classList.add('show');
  lucide.createIcons();
  clearTimeout(toast._t);
  toast._t = setTimeout(()=>el.classList.remove('show'), 2400);

/* ---------------------------- 資料存取 helper ---------------------------- */
function ensureTripBuckets(tripId){
  if(!state.itinerary[tripId]) state.itinerary[tripId] = {};
  if(!state.expenses[tripId]) state.expenses[tripId] = [];
  if(!state.todos[tripId]) state.todos[tripId] = {出發前:[], 抵達後:[], 回國前:[], 自訂:[]};
  if(!state.packing[tripId]) state.packing[tripId] = {};
  if(!state.documents[tripId]) state.documents[tripId] = {passport:{}, flights:[], hotels:[], insurance:{}, visa:{}, bookingNumbers:[], emergencyContacts:[], esim:{}};
  if(!state.transport[tripId]) state.transport[tripId] = [];
  if(!state.accommodation[tripId]) state.accommodation[tripId] = [];
  if(!state.notes[tripId]) state.notes[tripId] = [];
  if(!state.packing[tripId] || Object.keys(state.packing[tripId]).length===0){
    PACKING_DEFAULT_CATEGORIES.forEach(c=> state.packing[tripId][c] = []);
  }
}

function tripBudgetStats(tripId){
  const trip = state.trips.find(t=>t.id===tripId);
  const exp = state.expenses[tripId] || [];
  const tripCurrency = trip? trip.currency : 'AUD';
  let spent = 0, unconverted = 0;
  exp.forEach(e=>{
    const amt = Number(e.amount||0);
    if(!e.currency || e.currency===tripCurrency){ spent += amt; return; }
    const converted = convertCurrency(amt, e.currency, tripCurrency);
    if(converted==null){ spent += amt; unconverted++; } else { spent += converted; }
  });
  const budget = Number(trip? trip.budget:0) || 0;
  const remaining = budget - spent;
  const pct = budget>0 ? Math.min(999, Math.round(spent/budget*100)) : 0;
  const daysUsed = new Set(exp.map(e=>e.date)).size || 1;
  const dailyAvg = spent / daysUsed;
  return {spent, budget, remaining, pct, dailyAvg, count:exp.length, unconverted};
}

/* ---------------------------- 全域匯率快取（用於跨幣別花費換算） ---------------------------- */
let RATES_TWD = null; // { AUD:0.045, USD:0.031, TWD:1, ... } 表示 1 TWD 可換多少該幣別
let ratesLoading = false;
async function ensureGlobalRates(){
  if(RATES_TWD || ratesLoading) return;
  ratesLoading = true;
  try{
    const res = await fetch('https://api.frankfurter.app/latest?from=TWD');
    const data = await res.json();
    RATES_TWD = Object.assign({TWD:1}, data.rates||{});
    render(); // 換算完成後重繪目前畫面，讓金額更新為正確換算值
  }catch(e){ /* 保持 null，退回原始加總 */ }
  ratesLoading = false;
}
function convertCurrency(amount, from, to){
  if(from===to) return amount;
  if(!RATES_TWD) return null;
  const twd = from==='TWD' ? amount : (RATES_TWD[from] ? amount/RATES_TWD[from] : null);
  if(twd==null) return null;
  if(to==='TWD') return twd;
  return RATES_TWD[to] ? twd*RATES_TWD[to] : null;
}

function runMobileSearch(q){
  const box = document.getElementById('mobile-search-results');
  if(!q || !q.trim()){ box.innerHTML=''; return; }
  const query = q.toLowerCase();
  const results = [];
  state.trips.forEach(trip=>{
    Object.entries(state.itinerary[trip.id]||{}).forEach(([date,items])=>{
      items.forEach(item=>{
        if((item.name+item.location+item.notes).toLowerCase().includes(query)){
          results.push({title:item.name, meta:`行程 · ${trip.city} · ${fmtDate(date,'short')}`, go:()=>{ui.activeTripId=trip.id; ui.view='itinerary'; persistUI();}});
        }
      });
    });
    (state.expenses[trip.id]||[]).forEach(e=>{
      if((e.category+e.note).toLowerCase().includes(query)){
        results.push({title:`${e.category} · ${fmtMoney(e.amount,e.currency)}`, meta:`花費 · ${trip.city}`, go:()=>{ui.activeTripId=trip.id; ui.view='expenses'; persistUI();}});
      }
    });
    (state.notes[trip.id]||[]).forEach(n=>{
      if((n.title+n.markdown).toLowerCase().includes(query)){
        results.push({title:n.title||'（無標題筆記）', meta:`筆記 · ${trip.city}`, go:()=>{ui.activeTripId=trip.id; ui.view='notes'; persistUI();}});
      }
    });
  });
  box.innerHTML = results.length? results.slice(0,15).map((r,i)=>`<div class="search-item" data-msi="${i}" style="border-radius:12px; margin-bottom:4px;"><div class="sr-title">${escapeHtml(r.title)}</div><div class="sr-meta">${r.meta}</div></div>`).join('')
    : `<div class="search-item" style="color:var(--text-3)">沒有找到符合的結果</div>`;
  box.querySelectorAll('[data-msi]').forEach((el,i)=>{
    el.addEventListener('click', ()=>{ results[i].go(); document.getElementById('mobile-search-overlay').classList.remove('show'); render(); });
  });
}

function runSearch(q){
  ui.searchQuery = q;
  const box = document.getElementById('search-results');
  if(!q || q.trim().length<1){ box.classList.remove('show'); box.innerHTML=''; return; }
  const query = q.toLowerCase();
  const results = [];
  state.trips.forEach(trip=>{
    const it = state.itinerary[trip.id]||{};
    Object.entries(it).forEach(([date,items])=>{
      items.forEach(item=>{
        if((item.name+item.location+item.notes).toLowerCase().includes(query)){
          results.push({title:item.name, meta:`行程 · ${trip.city} · ${fmtDate(date,'short')}`, go:()=>{ui.activeTripId=trip.id; ui.view='itinerary'; persistUI(); render();}});
        }
      });
    });
    (state.expenses[trip.id]||[]).forEach(e=>{
      if((e.category+e.note).toLowerCase().includes(query)){
        results.push({title:`${e.category} · ${fmtMoney(e.amount,e.currency)}`, meta:`花費 · ${trip.city} · ${fmtDate(e.date,'short')}`, go:()=>{ui.activeTripId=trip.id; ui.view='expenses'; persistUI(); render();}});
      }
    });
    (state.notes[trip.id]||[]).forEach(n=>{
      if((n.title+n.markdown).toLowerCase().includes(query)){
        results.push({title:n.title||'（無標題筆記）', meta:`筆記 · ${trip.city}`, go:()=>{ui.activeTripId=trip.id; ui.view='notes'; persistUI(); render();}});
      }
    });
    (state.accommodation[trip.id]||[]).forEach(a=>{
      if((a.name+a.address).toLowerCase().includes(query)){
        results.push({title:a.name, meta:`住宿 · ${trip.city}`, go:()=>{ui.activeTripId=trip.id; ui.view='accommodation'; persistUI(); render();}});
      }
    });
  });
  if(results.length===0){ box.innerHTML = `<div class="search-item" style="color:var(--text-3)">沒有找到符合的結果</div>`; }
  else{
    box.innerHTML = results.slice(0,10).map((r,i)=>`<div class="search-item" data-si="${i}"><div class="sr-title">${escapeHtml(r.title)}</div><div class="sr-meta">${r.meta}</div></div>`).join('');
    box.querySelectorAll('[data-si]').forEach((el,i)=>{
      el.addEventListener('click', ()=>{ results[i].go(); box.classList.remove('show'); });
    });
  }
  box.classList.add('show');
}

function renderDashboard(root){
  if(!state.trips.length){

      <div class="es-title">還沒有任何旅程</div>

    </div></div>`;
    root.querySelector('#dash-new-trip').addEventListener('click', openTripModal);
    return;
  }
  const trip = activeTrip() || state.trips[0];
  ui.activeTripId = trip.id;
  const today = todayStr();
  const daysLeft = daysBetween(today, trip.startDate);
  const totalDays = daysBetween(trip.startDate, trip.endDate)+1;
  const inProgress = today>=trip.startDate && today<=trip.endDate;
  const done = today>trip.endDate;
  const stats = tripBudgetStats(trip.id);
  const pctClamped = Math.min(100, stats.pct);
  const overBudget = stats.pct>100;
  const ringColor = overBudget ? 'var(--red)' : stats.pct>80 ? 'var(--orange)' : 'var(--blue)';
  const circumference = 2*Math.PI*52;
  const ringPct = inProgress? 100 : done ? 100 : Math.max(0, Math.min(100, 100-(daysLeft/60*100)));
  const msg = countdownMessage(daysLeft, inProgress, done);
  const urgent = !done && !inProgress && daysLeft<=5;
  const soon = !done && !inProgress && daysLeft>5 && daysLeft<=10;

  root.innerHTML = `
    <div class="grid dash-hero-grid">
      <div class="card hero-card" style="background:linear-gradient(180deg, ${colorVar(trip.color)}0d, transparent 60%);">
        <div class="tag tag-${trip.color}" style="margin-bottom:10px;"><i data-lucide="sparkles" class="icon" style="width:11px;height:11px"></i>即將出發</div>
        <div class="hero-title">${escapeHtml(trip.city)}</div>
        <div class="hero-sub">${escapeHtml(trip.country)} · ${fmtDate(trip.startDate,'short')} – ${fmtDate(trip.endDate,'short')}（共${totalDays}天）</div>

        <div class="hero-ring-zone">
          <button class="hero-ring-wrap ${urgent?'pulse-urgent':soon?'pulse-soon':''}" id="countdown-ring-btn" aria-label="查看倒數細節">
            <svg viewBox="0 0 116 116" class="hero-ring-svg">
              <circle cx="58" cy="58" r="52" fill="none" stroke="var(--border-soft)" stroke-width="9"/>
              <circle cx="58" cy="58" r="52" fill="none" stroke="${colorVar(trip.color)}" stroke-width="9" stroke-linecap="round"
                stroke-dasharray="${circumference}" stroke-dashoffset="${circumference*(1-ringPct/100)}" transform="rotate(-90 58 58)" class="hero-ring-arc"/>
            </svg>
            <div class="hero-ring-center">
              <div class="hero-ring-num">${done?'':inProgress?'':daysLeft}</div>
              ${done?'<i data-lucide="flag" class="icon" style="width:22px;height:22px;color:var(--text-3);"></i>':inProgress?'<i data-lucide="sparkles" class="icon" style="width:24px;height:24px;color:var(--green);"></i>':'<div class="hero-ring-label">天後出發</div>'}
            </div>
          </button>
          <div class="countdown-badge tag-${msg.tone}">
            <i data-lucide="${msg.icon}" class="icon" style="width:13px;height:13px;"></i>
            <span>${msg.text}</span>
          </div>
        </div>

        ${trip.notes?`<div class="hero-notes">${escapeHtml(trip.notes)}</div>`:''}
      </div>

      <div class="card">
        <div class="card-title">預算總覽</div>
        <div style="display:flex; align-items:baseline; gap:8px; margin-top:12px;">
          <div class="num" style="font-size:24px; font-weight:600;">${fmtMoney(stats.spent)}</div>

        </div>
        <div class="progress-track" style="margin-top:10px;">
          <div class="progress-fill" style="width:${pctClamped}%; background:${ringColor};"></div>
        </div>
        <div class="row-between" style="margin-top:8px;">
          <span style="font-size:11.5px; color:var(--text-3);">${stats.pct}% 已使用</span>
          <span class="tag ${overBudget?'tag-red':'tag-green'}">${overBudget?'超支 '+fmtMoney(Math.abs(stats.remaining)):'剩餘 '+fmtMoney(stats.remaining)}</span>

    if(inProgress){ toast('旅程進行中，祝你玩得開心','sparkles'); return; }
    if(daysLeft<=1){
      const hrs = Math.max(0, Math.round((new Date(trip.startDate+'T00:00:00') - new Date())/3600000));
      toast(daysLeft===0? '今天就出發囉！':`約 ${hrs} 小時後出發`, 'plane-takeoff');
    } else {
      toast(`出發日：${fmtDate(trip.startDate)}，還有 ${daysLeft} 天`, 'calendar');
    }

  root.querySelectorAll('[data-quickadd]').forEach(el=>{
    el.addEventListener('click', ()=>{ const v=el.dataset.quickadd; ui.view=v; persistUI(); render();
      setTimeout(()=>{ if(v==='itinerary') openItineraryItemModal(); if(v==='expenses') openExpenseModal(); if(v==='todo') openTodoAddModal('自訂'); },30);
    });
  });
}
function renderUpcomingTransportCard(trip){
  const today = todayStr();
  const list = (state.transport[trip.id]||[]).filter(t=>t.date && t.date>=today).sort((a,b)=>(a.date+a.time).localeCompare(b.date+b.time));
  const next = list[0];
  if(!next) return '';
  const meta = TRANSPORT_TYPES.find(x=>x.id===next.type) || TRANSPORT_TYPES[0];
  const dLeft = daysBetween(today, next.date);
  return `<div class="card" data-goto-transport="1" style="cursor:pointer; border-left:3px solid var(--blue);">
    <div class="row-between">
      <div style="display:flex; align-items:center; gap:10px;">
        <div style="width:38px;height:38px;border-radius:11px;background:var(--blue-soft);display:flex;align-items:center;justify-content:center;"><i data-lucide="${meta.icon}" class="icon" style="color:var(--blue)"></i></div>
        <div>
          <div style="font-weight:700; font-size:13.5px;">下一段交通：${escapeHtml(next.from)} → ${escapeHtml(next.to)}${next.flightNo?' · '+escapeHtml(next.flightNo):''}</div>
          <div style="font-size:11.5px; color:var(--text-3);">${fmtDate(next.date)} ${next.time||''}${dLeft>0?' · 還有 '+dLeft+' 天':dLeft===0?' · 就是今天':''}</div>
        </div>
      </div>
      <i data-lucide="chevron-right" class="icon" style="color:var(--text-3);"></i>
    </div>
    ${(next.baggage||next.checkinInfo)?`<div style="margin-top:10px; padding-top:10px; border-top:1px solid var(--border-soft); font-size:11.5px; color:var(--text-2); display:flex; flex-direction:column; gap:4px;">
      ${next.baggage?`<div><i data-lucide="luggage" class="icon" style="width:12px;height:12px;vertical-align:-1px;color:var(--text-3);"></i> 行李額度：${escapeHtml(next.baggage)}</div>`:''}
      ${next.checkinInfo?`<div><i data-lucide="clock" class="icon" style="width:12px;height:12px;vertical-align:-1px;color:var(--orange);"></i> ${escapeHtml(next.checkinInfo)}</div>`:''}
    </div>`:''}
  </div>`;
}
function countdownMessage(daysLeft, inProgress, done){
  if(done) return {icon:'flag', text:'旅程已經結束，好好回味這趟旅行吧', tone:'gray'};
  if(inProgress) return {icon:'sparkles', text:'旅程進行中，好好享受每一刻', tone:'green'};
  if(daysLeft<=0) return {icon:'plane-takeoff', text:'今天就出發了，祝旅途愉快', tone:'blue'};
  if(daysLeft===1) return {icon:'alarm-clock', text:'明天出發！行李都打包好了嗎？', tone:'red'};
  if(daysLeft<=5) return {icon:'luggage', text:`倒數 ${daysLeft} 天，最後檢查一次待辦清單吧`, tone:'red'};
  if(daysLeft<=10) return {icon:'zap', text:`只剩 ${daysLeft} 天了，行李開始準備了嗎？`, tone:'orange'};
  if(daysLeft<=20) return {icon:'list-checks', text:`還有 ${daysLeft} 天，證件跟保險都確認了嗎？`, tone:'orange'};
  if(daysLeft<=50) return {icon:'calendar-clock', text:`還有 ${daysLeft} 天，行程細節可以慢慢補齊`, tone:'blue'};
  return {icon:'compass', text:'旅程正在醞釀中，慢慢規劃就好', tone:'gray'};
}
function quickAddCard(icon,label,view,color){
  return `<div class="card" data-quickadd="${view}" style="cursor:pointer; display:flex; align-items:center; gap:12px;">
    <div style="width:38px;height:38px;border-radius:11px;background:var(--${color}-soft);display:flex;align-items:center;justify-content:center;">
      <i data-lucide="${icon}" class="icon" style="color:var(--${color});width:18px;height:18px;"></i>
    </div>
    <div style="font-size:13.5px; font-weight:600;">${label}</div>
    <i data-lucide="chevron-right" class="icon" style="margin-left:auto; color:var(--text-3);"></i>
  </div>`;
}
function renderRecentActivity(tripId){
  const acts = [];
  (state.expenses[tripId]||[]).forEach(e=> acts.push({icon:'receipt', color:'green', text:`花費：${e.category} ${fmtMoney(e.amount,e.currency)}`, sub:e.note, date:e.date}));
  Object.entries(state.itinerary[tripId]||{}).forEach(([date,items])=>{
    items.filter(i=>i.status==='完成').forEach(i=> acts.push({icon:'check-circle-2', color:'blue', text:`已完成：${i.name}`, sub:i.location, date}));
  });
  acts.sort((a,b)=> (b.date||'').localeCompare(a.date||''));
  const top = acts.slice(0,6);
  if(!top.length) return `<div class="empty-state" style="padding:24px;"><i data-lucide="activity" class="icon"></i><div class="es-sub">還沒有活動紀錄</div></div>`;
  return top.map(a=>`<div class="checklist-row">
    <div style="width:30px;height:30px;border-radius:9px;background:var(--${a.color}-soft);display:flex;align-items:center;justify-content:center;flex-shrink:0;">
      <i data-lucide="${a.icon}" class="icon" style="width:14px;height:14px;color:var(--${a.color})"></i>
    </div>
    <div class="cl-text"><div>${escapeHtml(a.text)}</div><div style="font-size:11px;color:var(--text-3)">${escapeHtml(a.sub||'')} · ${fmtDate(a.date,'short')}</div></div>
  </div>`).join('');
}

/* ============================================================
   TRIPS
   ============================================================ */
let tripsCollapsedInit = false;
let tripsCollapsed = {};
function renderTrips(root){
  if(!tripsCollapsedInit){
    state.trips.forEach(t=>{ tripsCollapsed[t.id] = t.id!==ui.activeTripId; });
    tripsCollapsedInit = true;
  }
  const today = todayStr();
  const upcoming = state.trips.filter(t=>t.startDate>=today).sort((a,b)=>a.startDate.localeCompare(b.startDate))[0];
  const current = state.trips.find(t=> today>=t.startDate && today<=t.endDate);
  const heroTrip = current || upcoming;
  const heroDays = heroTrip ? daysBetween(today, heroTrip.startDate) : null;

  root.innerHTML = `
    ${heroTrip?`<div class="card" style="text-align:center; padding:26px 20px;">
      <div class="folder-body-sub" style="font-size:12px;">${current? '旅程進行中':'距離下一趟旅程'}</div>
      <div class="num" style="font-size:44px; font-weight:700; color:${colorVar(heroTrip.color)}; line-height:1.15; margin-top:2px;">${current? escapeHtml(heroTrip.city) : heroDays}</div>
      <div style="font-size:12.5px; color:var(--text-2); margin-top:4px;">${current? '祝旅途愉快' : (heroDays===0?'就是今天！':'天後出發 · '+escapeHtml(heroTrip.city))}</div>
    </div>`:''}

    <div class="row-between">
      <div class="card-sub" style="font-size:13px;">共 ${state.trips.length} 個旅程</div>
      <button class="btn btn-filled btn-sm" id="add-trip-btn"><i data-lucide="plus" class="icon"></i>新增旅程</button>
    </div>
    <div style="display:flex; flex-direction:column; gap:12px;" id="trips-list"></div>
  `;
  const list = root.querySelector('#trips-list');
  if(!state.trips.length){
    list.innerHTML = `<div class="card"><div class="empty-state"><i data-lucide="briefcase" class="icon"></i><div class="es-title">還沒有旅程</div><div class="es-sub">點右上角「新增旅程」建立第一個吧，之後每個旅程都可以像資料夾一樣收合起來</div></div></div>`;
  } else {
    list.innerHTML = state.trips.map(t=>{
      const stats = tripBudgetStats(t.id);
      const dayCount = tripDayList(t).length;
      const collapsed = tripsCollapsed[t.id];
      const dLeft = daysBetween(today, t.startDate);
      const isCurrent = today>=t.startDate && today<=t.endDate;
      const isDone = today>t.endDate;
      const chipLabel = isDone? '已結束' : isCurrent? '進行中' : dLeft===0? '今天出發' : dLeft>0? dLeft+' 天後':'';
      const chipTone = isDone?'gray':isCurrent?'green':dLeft<=5?'red':dLeft<=15?'orange':'blue';
      return `<div class="card folder-card" data-trip-toggle="${t.id}">
        <div class="folder-header">
          <div class="avatar-badge" style="background:${colorVar(t.color)};"><i data-lucide="compass" class="icon"></i></div>
          <div style="flex:1; min-width:0;">
            <div class="folder-body-title">${escapeHtml(t.city)}${t.id===ui.activeTripId?' <span class="tag tag-blue" style="vertical-align:2px;">目前使用中</span>':''}</div>
            <div class="folder-body-sub">${escapeHtml(t.country)} · ${fmtDate(t.startDate,'short')} – ${fmtDate(t.endDate,'short')} · ${dayCount}天</div>
          </div>
          <div style="display:flex; flex-direction:column; align-items:flex-end; gap:6px; flex-shrink:0;">
            <span class="count-chip tag-${chipTone}">${chipLabel}</span>
            <i data-lucide="${collapsed?'chevron-down':'chevron-up'}" class="icon" style="color:var(--text-3);"></i>
          </div>
        </div>
        <div class="mini-progress"><div class="mini-progress-fill" style="width:${Math.min(100,stats.pct)}%; background:${stats.pct>100?'var(--red)':colorVar(t.color)};"></div></div>
        <div class="row-between" style="margin-top:6px;">
          <span style="font-size:11px; color:var(--text-3);" class="num">${fmtMoney(stats.spent)} / ${fmtMoney(stats.budget,t.currency)}</span>
          <span style="font-size:11px; color:var(--text-3);">${stats.pct}%</span>
        </div>
        ${collapsed?'':`<div class="folder-expand no-print-anim">
          ${t.notes?`<div style="font-size:12.5px; color:var(--text-2); line-height:1.6;">${escapeHtml(t.notes)}</div>`:''}
          <div class="grid grid-3">
            <div><div style="font-size:10px;color:var(--text-3);">已花費</div><div class="num" style="font-size:13px;font-weight:600;">${fmtMoney(stats.spent)}</div></div>
            <div><div style="font-size:10px;color:var(--text-3);">剩餘預算</div><div class="num" style="font-size:13px;font-weight:600; color:${stats.remaining<0?'var(--red)':'var(--text)'}">${fmtMoney(stats.remaining)}</div></div>
            <div><div style="font-size:10px;color:var(--text-3);">花費筆數</div><div class="num" style="font-size:13px;font-weight:600;">${stats.count}</div></div>
          </div>
          <div style="display:flex; gap:8px; flex-wrap:wrap;">
            <button class="btn btn-filled btn-sm" data-open-trip="${t.id}" style="flex:1;"><i data-lucide="arrow-right-circle" class="icon"></i>進入此旅程</button>
            <button class="btn btn-outline btn-sm" data-edit-trip="${t.id}"><i data-lucide="pencil" class="icon"></i>編輯</button>
            <button class="btn btn-danger btn-sm" data-del-trip="${t.id}"><i data-lucide="trash-2" class="icon"></i>刪除</button>
          </div>
        </div>`}
      </div>`;
    }).join('');
  }
  root.querySelector('#add-trip-btn').addEventListener('click', ()=>openTripModal());
  root.querySelectorAll('[data-trip-toggle]').forEach(el=>{
    el.addEventListener('click', (e)=>{
      if(e.target.closest('button')) return;
      const id = el.dataset.tripToggle;
      tripsCollapsed[id] = !tripsCollapsed[id];
      renderTrips(root);
    });
  });
  root.querySelectorAll('[data-open-trip]').forEach(el=>{
    el.addEventListener('click', (e)=>{ e.stopPropagation(); ui.activeTripId=el.dataset.openTrip; ui.view='dashboard'; persistUI(); render(); });
  });
  root.querySelectorAll('[data-edit-trip]').forEach(el=> el.addEventListener('click',(e)=>{e.stopPropagation(); openTripModal(state.trips.find(t=>t.id===el.dataset.editTrip));}));
  root.querySelectorAll('[data-del-trip]').forEach(el=> el.addEventListener('click',(e)=>{
    e.stopPropagation();
    if(confirm('確定要刪除這個旅程嗎？所有相關的行程、花費、筆記都會一併刪除。')){
      const id = el.dataset.delTrip;
      state.trips = state.trips.filter(t=>t.id!==id);
      [state.itinerary,state.expenses,state.todos,state.packing,state.documents,state.transport,state.accommodation,state.notes].forEach(bucket=> delete bucket[id]);
      delete tripsCollapsed[id];
      if(ui.activeTripId===id) ui.activeTripId = state.trips[0]? state.trips[0].id : null;
      persist(true); persistUI(); render(); toast('已刪除旅程','trash-2');
    }
  }));
  lucide.createIcons();
}

function openTripModal(trip){
  const isEdit = !!trip;
  const body = `
    <div class="grid grid-2">
      <div class="field"><label>國家</label><input id="f-country" value="${escapeHtml(trip?.country||'')}" placeholder="例如：澳洲"></div>
      <div class="field"><label>城市</label><input id="f-city" value="${escapeHtml(trip?.city||'')}" placeholder="例如：雪梨・布里斯本"></div>
      <div class="field"><label>開始日期</label><input type="date" id="f-start" value="${trip?.startDate||''}"></div>
      <div class="field"><label>結束日期</label><input type="date" id="f-end" value="${trip?.endDate||''}"></div>
      <div class="field"><label>幣別</label><select id="f-currency">${CURRENCIES.map(c=>`<option ${trip?.currency===c?'selected':''}>${c}</option>`).join('')}</select></div>
      <div class="field"><label>預算</label><input type="number" id="f-budget" value="${trip?.budget||''}" placeholder="0"></div>
    </div>
    <div class="field"><label>主題色</label>
      <div style="display:flex; gap:8px;">${TRIP_COLORS.map(c=>`<div data-color="${c}" style="width:30px;height:30px;border-radius:50%;background:${colorVar(c)};cursor:pointer;border:2.5px solid ${trip&&trip.color===c?'var(--text)':'transparent'};outline:2px solid ${colorVar(c)}22;"></div>`).join('')}</div>
    </div>
    <div class="field"><label>備註</label><textarea id="f-notes" placeholder="航班時間、住宿等備註…">${escapeHtml(trip?.notes||'')}</textarea></div>
  `;
  let pickedColor = trip?.color || 'blue';
  openModal({
    title: isEdit?'編輯旅程':'新增旅程', body,
    foot: `<button class="btn btn-outline" data-close>取消</button><button class="btn btn-filled" id="save-trip-btn">${isEdit?'儲存':'建立旅程'}</button>`
  });
  document.querySelectorAll('[data-color]').forEach(el=>{
    el.addEventListener('click', ()=>{ pickedColor = el.dataset.color; document.querySelectorAll('[data-color]').forEach(x=>x.style.borderColor='transparent'); el.style.borderColor='var(--text)'; });
  });
  document.getElementById('save-trip-btn').addEventListener('click', ()=>{
    const country = document.getElementById('f-country').value.trim();
    const city = document.getElementById('f-city').value.trim();
    const startDate = document.getElementById('f-start').value;
    const endDate = document.getElementById('f-end').value;
    if(!city || !startDate || !endDate){ toast('請至少填寫城市與日期','alert-triangle'); return; }
    const data = { country, city, startDate, endDate, currency:document.getElementById('f-currency').value, budget:Number(document.getElementById('f-budget').value)||0, notes:document.getElementById('f-notes').value, color:pickedColor };
    if(isEdit){ Object.assign(trip, data); toast('旅程已更新','check'); }
    else{ const id=uid('trip'); state.trips.push({id, ...data}); ensureTripBuckets(id); ui.activeTripId=id; toast('旅程已建立','check'); }
    persist(true); persistUI(); closeModal(); render();
  });
}

let itinCollapsed = {}; // dayDate -> bool
let itinMode = 'daily'; // daily | timeline | overview | map

function renderItinerary(root){
  if(needsTripGuard(root,'行程安排')) return;
  const trip = activeTrip();
  ensureTripBuckets(trip.id);
  const days = tripDayList(trip);

  root.innerHTML = `
    <div class="row-between" style="flex-wrap:wrap; gap:10px;">
      <div style="display:flex; gap:6px; background:var(--surface-2); padding:4px; border-radius:11px; border:1px solid var(--border-soft);">
        ${[['daily','日曆式'],['timeline','時間軸'],['overview','總覽'],['map','地圖']].map(([m,l])=>
          `<button class="btn btn-sm ${itinMode===m?'btn-filled':'btn-ghost'}" data-mode="${m}" style="border-radius:8px;">${l}</button>`).join('')}
      </div>
      <div style="display:flex; gap:8px;">
        <button class="btn btn-outline btn-sm" id="ai-import-btn"><i data-lucide="sparkles" class="icon"></i>AI 行程匯入</button>
        <button class="btn btn-filled btn-sm" id="add-item-btn"><i data-lucide="plus" class="icon"></i>新增行程</button>
      </div>
    </div>
    <div id="itin-content"></div>
  `;
  root.querySelectorAll('[data-mode]').forEach(el=> el.addEventListener('click', ()=>{ itinMode=el.dataset.mode; renderItinerary(root); }));
  root.querySelector('#add-item-btn').addEventListener('click', ()=>openItineraryItemModal());
  root.querySelector('#ai-import-btn').addEventListener('click', openAIImportModal);

  const content = root.querySelector('#itin-content');
  if(!days.length){ content.innerHTML = `<div class="card" style="margin-top:16px;"><div class="empty-state"><i data-lucide="calendar-x" class="icon"></i><div class="es-sub">請先在「旅程管理」設定旅程的日期範圍</div></div></div>`; return; }

  if(itinMode==='daily') content.innerHTML = renderItinDaily(trip, days);
  else if(itinMode==='timeline') content.innerHTML = renderItinTimeline(trip, days);
  else if(itinMode==='overview') content.innerHTML = renderItinOverview(trip, days);
  else content.innerHTML = renderItinMap(trip, days);

  wireItinEvents(trip);
}

function dayItems(tripId, date){ return (state.itinerary[tripId] && state.itinerary[tripId][date]) || []; }

function renderItinDaily(trip, days){
  return `<div style="display:flex; flex-direction:column; gap:12px; margin-top:16px;">${days.map(d=>{
    const items = dayItems(trip.id, d.date).slice().sort((a,b)=> (a.time||'').localeCompare(b.time||''));
    const collapsed = itinCollapsed[d.date];
    const dayCost = items.reduce((s,i)=>s+Number(i.cost||0),0);
    const doneCount = items.filter(i=>i.status==='完成').length;
    const dayPct = items.length? Math.round(doneCount/items.length*100):0;
    return `<div class="card" style="padding:0; overflow:hidden; border-left:3px solid ${colorVar(trip.color)};">
      <div class="row-between" data-toggle-day="${d.date}" style="cursor:pointer; padding:16px 20px;">
        <div style="display:flex; align-items:center; gap:12px; flex:1; min-width:0;">
          <div style="width:38px;height:38px;border-radius:10px;background:${colorVar(trip.color)}12;display:flex;align-items:center;justify-content:center;flex-shrink:0;">
            <span class="num" style="font-weight:700; font-size:13px; color:${colorVar(trip.color)}">D${d.dayNum}</span>
          </div>
          <div style="flex:1; min-width:0;">
            <div style="font-weight:700; font-size:14px;">${fmtDate(d.date)}</div>
            <div style="font-size:11.5px; color:var(--text-3);">${items.length} 個行程${dayCost?' · '+fmtMoney(dayCost)+' '+trip.currency:''}</div>
            ${items.length?`<div class="mini-progress" style="margin-top:7px; max-width:180px;"><div class="mini-progress-fill" style="width:${dayPct}%; background:${colorVar(trip.color)};"></div></div>`:''}
          </div>
        </div>
        <i data-lucide="${collapsed?'chevron-down':'chevron-up'}" class="icon" style="color:var(--text-3); flex-shrink:0;"></i>
      </div>

function wireItinEvents(trip){

    el.addEventListener('click', ()=>{
      const {item,date} = findItinItem(trip.id, el.dataset.editItem);
      if(item) openItineraryItemModal(item, date);
    });
  });
  document.querySelectorAll('[data-del-item]').forEach(el=>{
    el.addEventListener('click', ()=>{
      const {date} = findItinItem(trip.id, el.dataset.delItem);
      if(date && confirm('確定刪除這筆行程？')){
        state.itinerary[trip.id][date] = state.itinerary[trip.id][date].filter(i=>i.id!==el.dataset.delItem);

      }
    });

  document.querySelectorAll('[data-add-expense-item]').forEach(el=>{
    el.addEventListener('click', ()=>{
      const {item,date} = findItinItem(trip.id, el.dataset.addExpenseItem);
      if(item) openExpenseModal(null, {date, note:item.name, amount:item.cost, category:'景點門票'});
    });
  });
}

function findItinItem(tripId, itemId){
  const buckets = state.itinerary[tripId]||{};
  for(const date in buckets){ const found = buckets[date].find(i=>i.id===itemId); if(found) return {item:found, date}; }
  return {item:null, date:null};
}

    <div class="grid grid-2">
      <div class="field"><label>地點</label><input id="f-location" value="${escapeHtml(item?.location||'')}"></div>
      <div class="field"><label>Google Maps 連結</label><input id="f-maplink" value="${escapeHtml(item?.mapLink||'')}" placeholder="https://maps.google.com/..."></div>
    </div>
    <div class="grid grid-3">
      <div class="field"><label>交通方式</label><input id="f-transport" value="${escapeHtml(item?.transport||'')}" placeholder="步行/火車…"></div>
      <div class="field"><label>預估花費</label><input type="number" id="f-cost" value="${item?.cost||''}"></div>

    </div>

    <div class="field"><label>備註</label><textarea id="f-notes">${escapeHtml(item?.notes||'')}</textarea></div>
  `;
  openModal({
    title: isEdit?'編輯行程':'新增行程', body,
    foot:`<button class="btn btn-outline" data-close>取消</button><button class="btn btn-filled" id="save-item-btn">${isEdit?'儲存':'新增'}</button>`
  });
  document.getElementById('save-item-btn').addEventListener('click', ()=>{
    const name = document.getElementById('f-name').value.trim();

    const newDate = document.getElementById('f-date').value;
    const data = {
      time:document.getElementById('f-time').value, name,
      location:document.getElementById('f-location').value, mapLink:document.getElementById('f-maplink').value,
      transport:document.getElementById('f-transport').value, cost:Number(document.getElementById('f-cost').value)||0,
      status:document.getElementById('f-status').value, booking:document.getElementById('f-booking').value,
      notes:document.getElementById('f-notes').value,
    };
    ensureTripBuckets(trip.id);
    if(isEdit){
      const {date:oldDate} = findItinItem(trip.id, item.id);
      state.itinerary[trip.id][oldDate] = state.itinerary[trip.id][oldDate].filter(i=>i.id!==item.id);
      if(!state.itinerary[trip.id][newDate]) state.itinerary[trip.id][newDate]=[];
      state.itinerary[trip.id][newDate].push({...item, ...data});
      toast('行程已更新','check');
    } else {
      if(!state.itinerary[trip.id][newDate]) state.itinerary[trip.id][newDate]=[];

      toast('行程已新增','check');
    }
    persist(true); closeModal(); renderItinerary(document.getElementById('view-inner'));
  });

function openAIImportModal(){
  const body = `
    <div class="field">
      <label>貼上你的行程內容（文字、Markdown 皆可）</label>
      <textarea id="ai-input" style="min-height:180px;" placeholder="貼上像是「Day 1（10/1）：上午去雪梨歌劇院...」這樣的內容，AI會自動幫你拆解成每日行程卡片"></textarea>
    </div>
    <div id="ai-status" style="font-size:12px; color:var(--text-3); display:none;"></div>
    <div id="ai-preview" style="display:none;"></div>
  `;
  openModal({
    title:'AI 行程匯入', wide:true, body,
    foot:`<button class="btn btn-outline" data-close>取消</button><button class="btn btn-filled" id="ai-parse-btn"><i data-lucide="sparkles" class="icon"></i>解析行程</button>`
  });
  document.getElementById('ai-parse-btn').addEventListener('click', runAIParse);
}

async function runAIParse(){
  const trip = activeTrip();
  const input = document.getElementById('ai-input').value.trim();
  if(!input){ toast('請先貼上行程內容','alert-triangle'); return; }
  const statusEl = document.getElementById('ai-status');
  const btn = document.getElementById('ai-parse-btn');
  statusEl.style.display='block'; statusEl.textContent='AI 解析中，請稍候…';
  btn.disabled = true; btn.style.opacity=.6;
  try{
    const sys = `你是一個旅行行程解析器。使用者會貼上任意格式的旅行行程文字。請將其拆解成結構化 JSON，只回傳 JSON，不要有其他文字、不要用 markdown code block 包住。
格式：{"days":[{"date":"YYYY-MM-DD 或 D1 這種相對表示（若不確定確切日期，用 trip 的 startDate=${trip?.startDate||'未知'} 往後推算）","items":[{"time":"HH:MM 或空字串","name":"行程名稱","location":"地點","transport":"交通方式或空字串","notes":"備註或空字串"}]}]}
請盡量把每一項行程都抓出來，時間欄位若原文沒有明確時間就留空字串，date欄位務必輸出為 YYYY-MM-DD 格式。`;
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        model:'claude-sonnet-4-6', max_tokens:1000,
        system: sys,
        messages:[{role:'user', content: input}]
      })
    });
    const data = await resp.json();
    const textBlocks = (data.content||[]).filter(c=>c.type==='text').map(c=>c.text).join('\n');
    let cleaned = textBlocks.replace(/```json|```/g,'').trim();
    const parsed = JSON.parse(cleaned);
    renderAIPreview(parsed);
  }catch(e){
    statusEl.textContent = '解析失敗，請確認貼上的內容，或稍後再試一次。('+(e.message||'')+')';
  }finally{
    btn.disabled=false; btn.style.opacity=1;
  }
}

function renderAIPreview(parsed){
  const statusEl = document.getElementById('ai-status');
  const previewEl = document.getElementById('ai-preview');
  const totalItems = (parsed.days||[]).reduce((s,d)=>s+(d.items||[]).length,0);
  statusEl.textContent = `解析完成，找到 ${(parsed.days||[]).length} 天、共 ${totalItems} 筆行程，確認無誤後點擊「匯入」`;
  previewEl.style.display='block';
  previewEl.innerHTML = `<div style="max-height:260px; overflow-y:auto; border:1px solid var(--border); border-radius:12px; padding:10px 14px; margin-top:8px;">
    ${(parsed.days||[]).map(d=>`<div style="margin-bottom:10px;">
      <div style="font-weight:700; font-size:12.5px; color:var(--blue);">${d.date}</div>
      ${(d.items||[]).map(i=>`<div style="font-size:12px; padding:4px 0; color:var(--text-2);">${i.time||'--:--'} · ${escapeHtml(i.name)} ${i.location?'@ '+escapeHtml(i.location):''}</div>`).join('')}
    </div>`).join('')}
  </div>
  <button class="btn btn-filled btn-block" id="ai-confirm-import" style="margin-top:12px;"><i data-lucide="check" class="icon"></i>匯入這些行程</button>`;
  lucide.createIcons();
  document.getElementById('ai-confirm-import').addEventListener('click', ()=>{
    const trip = activeTrip();
    ensureTripBuckets(trip.id);
    (parsed.days||[]).forEach(d=>{
      if(!d.date) return;
      if(!state.itinerary[trip.id][d.date]) state.itinerary[trip.id][d.date]=[];
      (d.items||[]).forEach(i=>{
        state.itinerary[trip.id][d.date].push(mkItem(i.time||'', i.name||'未命名行程', i.location||'', '', i.transport||'', 0, '', i.notes||'', '未開始'));
      });
    });
    persist(true); closeModal(); toast('行程已匯入','sparkles'); ui.view='itinerary'; persistUI(); render();
  });
}

const CITY_NAME_MAP = {
  '雪梨':'Sydney','布里斯本':'Brisbane','墨爾本':'Melbourne','伯斯':'Perth','伯斯柏':'Perth','坎培拉':'Canberra','黃金海岸':'Gold Coast',
  '東京':'Tokyo','大阪':'Osaka','京都':'Kyoto','北海道':'Hokkaido','沖繩':'Okinawa','福岡':'Fukuoka','名古屋':'Nagoya',
  '首爾':'Seoul','釜山':'Busan','曼谷':'Bangkok','清邁':'Chiang Mai','新加坡':'Singapore','吉隆坡':'Kuala Lumpur',
  '巴黎':'Paris','倫敦':'London','羅馬':'Rome','紐約':'New York','洛杉磯':'Los Angeles','舊金山':'San Francisco',
  '香港':'Hong Kong','澳門':'Macau','上海':'Shanghai','北京':'Beijing','台北':'Taipei',
};
async function renderWeather(root){
  if(needsTripGuard(root,'天氣')) return;
  const trip = activeTrip();
  root.innerHTML = `<div class="card"><div class="empty-state"><i data-lucide="loader" class="icon"></i><div class="es-sub">正在查詢 ${escapeHtml(trip.city)} 的天氣…</div></div></div>`;
  const rawCity = trip.city.split(/[・,、\/]/)[0].trim();
  const cityQuery = CITY_NAME_MAP[rawCity] || rawCity;
  try{
    const geoRes = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(cityQuery)}&count=1&language=zh`);
    const geo = await geoRes.json();
    if(!geo.results || !geo.results.length) throw new Error('找不到此城市座標');
    const {latitude, longitude, name} = geo.results[0];
    const wRes = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${latitude}&longitude=${longitude}&daily=weathercode,temperature_2m_max,temperature_2m_min&timezone=auto&forecast_days=14`);
    const w = await wRes.json();
    renderWeatherResult(root, trip, name, w);
  }catch(e){
    root.innerHTML = `<div class="card"><div class="empty-state">
      <i data-lucide="cloud-off" class="icon"></i>
      <div class="es-title">無法取得即時天氣</div>

function weatherCodeInfo(code){
  const map = {
    0:['晴朗','sun'],1:['多雲時晴','cloud-sun'],2:['多雲','cloud'],3:['陰天','cloudy'],
    45:['有霧','cloud-fog'],48:['有霧','cloud-fog'],51:['毛毛雨','cloud-drizzle'],53:['毛毛雨','cloud-drizzle'],55:['毛毛雨','cloud-drizzle'],
    61:['小雨','cloud-rain'],63:['中雨','cloud-rain'],65:['大雨','cloud-rain-wind'],71:['小雪','cloud-snow'],73:['中雪','cloud-snow'],75:['大雪','cloud-snow'],
    80:['陣雨','cloud-rain'],81:['陣雨','cloud-rain'],82:['強陣雨','cloud-rain-wind'],95:['雷雨','cloud-lightning'],96:['雷雨','cloud-lightning'],99:['雷雨','cloud-lightning']
  };
  return map[code] || ['—','cloud'];
}
function renderWeatherResult(root, trip, name, w){

  let outfitTip = '早晚微涼，建議洋蔥式穿搭：短袖＋薄外套。';

async function renderExchange(root){

  root.innerHTML = `

    </div>

        <div class="field"><label>從</label><select id="conv-from">${CURRENCIES.map(c=>`<option ${c==='TWD'?'selected':''}>${c}</option>`).join('')}</select></div>
      </div>

      <div class="grid grid-2" style="align-items:end;">
        <div class="field"><label>結果</label><input id="conv-result" disabled value="—"></div>
        <div class="field"><label>到</label><select id="conv-to">${CURRENCIES.map(c=>`<option ${c===base?'selected':''}>${c}</option>`).join('')}</select></div>
      </div>
    </div>
    <div class="card">
      <div class="card-title">常用幣別對照（以 ${base} 為基準）</div>
      <div class="grid grid-4" id="common-rates" style="margin-top:12px;"></div>
    </div>
  `;
  lucide.createIcons();
  document.getElementById('refresh-rate-btn').addEventListener('click', ()=>fetchRates(base,true));
  document.getElementById('conv-amount').addEventListener('input', updateConversion);
  document.getElementById('conv-from').addEventListener('change', updateConversion);
  document.getElementById('conv-to').addEventListener('change', updateConversion);
  await fetchRates(base,false);
  updateConversion();
}
async function fetchRates(base, force){
  const statusEl = document.getElementById('rate-status');
  if(exchangeCache.base===base && exchangeCache.rates && Object.keys(exchangeCache.rates).length && !force){
    renderCommonRates(base); return;
  }
  try{
    const res = await fetch(`https://api.frankfurter.app/latest?from=${base}`);
    const data = await res.json();
    exchangeCache = { base, rates: data.rates || {}, fetchedAt: new Date() };
    if(statusEl) statusEl.textContent = `更新時間：${exchangeCache.fetchedAt.toLocaleTimeString('zh-TW')}（即時匯率，僅供參考）`;
    renderCommonRates(base);
  }catch(e){
    if(statusEl) statusEl.innerHTML = `<span style="color:var(--orange)">無法取得即時匯率，可改用下方手動換算（暫以概略匯率估算）</span>`;
    renderCommonRates(base);
  }
}
function renderCommonRates(base){
  const box = document.getElementById('common-rates');
  if(!box) return;
  const list = CURRENCIES.filter(c=>c!==base).slice(0,8);
  box.innerHTML = list.map(c=>{
    const rate = exchangeCache.rates[c];
    return `<div class="card" style="padding:12px; text-align:center; box-shadow:none;">
      <div style="font-size:11px; color:var(--text-3); font-weight:600;">1 ${base}</div>
      <div class="num" style="font-size:15px; font-weight:600; margin-top:4px;">${rate? rate.toFixed(3) : '—'}</div>
      <div style="font-size:10.5px; color:var(--text-3);">${c}</div>
    </div>`;
  }).join('');
}
function updateConversion(){
  const amt = Number(document.getElementById('conv-amount')?.value)||0;
  const from = document.getElementById('conv-from')?.value;
  const to = document.getElementById('conv-to')?.value;
  const resultEl = document.getElementById('conv-result');
  if(!resultEl) return;
  if(from===to){ resultEl.value = amt.toLocaleString(); return; }
  if(exchangeCache.base===from && exchangeCache.rates[to]){
    resultEl.value = (amt*exchangeCache.rates[to]).toLocaleString(undefined,{maximumFractionDigits:2});
  } else {
    fetch(`https://api.frankfurter.app/latest?from=${from}&to=${to}`).then(r=>r.json()).then(d=>{
      const rate = d.rates?.[to];
      resultEl.value = rate ? (amt*rate).toLocaleString(undefined,{maximumFractionDigits:2}) : '無法取得匯率';
    }).catch(()=>{ resultEl.value = '無法取得匯率'; });
  }
}

        const gpct = items.length? Math.round(gd/items.length*100):0;
        const gc = TRIP_COLORS[(ci+1) % TRIP_COLORS.length];
        return `<div class="card" style="border-left:3px solid ${colorVar(gc)};">
          <div class="row-between"><div class="card-title" style="display:flex; align-items:center; gap:7px;"><span style="width:7px;height:7px;border-radius:50%;background:${colorVar(gc)};display:inline-block;"></span>${escapeHtml(c)}</div><span style="font-size:11px; color:var(--text-3);" class="num">${gd}/${items.length}</span></div>
          <div class="mini-progress" style="margin-top:8px;"><div class="mini-progress-fill" style="width:${gpct}%; background:${colorVar(gc)};"></div></div>
          <div style="margin-top:8px;">
            ${items.map(t=>`
              <div class="checklist-row ${t.done?'done':''}">
                <div class="checkbox ${t.done?'checked':''}" data-toggle-pack="${c}|${t.id}">${t.done?'<i data-lucide=\"check\" class=\"icon\"></i>':''}</div>
                <div class="cl-text">${escapeHtml(t.text)}</div>
                <button class="icon-btn" style="width:26px;height:26px;" data-del-pack="${c}|${t.id}"><i data-lucide="x" class="icon" style="width:12px;height:12px;"></i></button>
              </div>`).join('') || `<div class="es-sub" style="padding:8px 0;">還沒有項目</div>`}
          </div>
          <button class="btn btn-ghost btn-sm" data-addpack="${c}" style="margin-top:8px;"><i data-lucide="plus" class="icon"></i>新增項目</button>
        </div>`;
      }).join('')}
    </div>
  `;
  root.querySelectorAll('[data-toggle-pack]').forEach(el=> el.addEventListener('click', ()=>{
    const [c,id] = el.dataset.togglePack.split('|');
    const t = state.packing[trip.id][c].find(x=>x.id===id); t.done=!t.done;
    persist(true); renderPacking(document.getElementById('view-inner'));
  }));
  root.querySelectorAll('[data-del-pack]').forEach(el=> el.addEventListener('click', ()=>{
    const [c,id] = el.dataset.delPack.split('|');
    state.packing[trip.id][c] = state.packing[trip.id][c].filter(x=>x.id!==id);
    persist(true); renderPacking(document.getElementById('view-inner'));
  }));
  root.querySelectorAll('[data-addpack]').forEach(el=> el.addEventListener('click', ()=>{
    const text = prompt('新增行李項目：'); if(!text) return;
    state.packing[trip.id][el.dataset.addpack].push(mkTodo(text,false));
    persist(true); renderPacking(document.getElementById('view-inner'));
  }));
  root.querySelector('#add-cat-btn').addEventListener('click', ()=>{
    const name = prompt('新分類名稱：'); if(!name) return;
    if(!state.packing[trip.id][name]) state.packing[trip.id][name]=[];
    persist(true); renderPacking(document.getElementById('view-inner'));
  });
}
